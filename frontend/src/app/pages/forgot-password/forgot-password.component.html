<app-banner
  title="Reset Password"
  subtitle="Set a new password for your account."
  background="default"
  [hideBreadcrumbs]="true">
</app-banner>

<section class="reset-page">
  <div class="reset-card">
    <h2>Forgot Your Password?</h2>
    <p class="reset-subtext">
      Enter your email and we will prepare a secure reset link for your account.
    </p>

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="reset-email">Email Address</label>
        <input
          type="email"
          id="reset-email"
          formControlName="email"
          autocomplete="email"
        />
      </div>

      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="success-message" *ngIf="successMessage">{{ successMessage }}</p>

      <p class="success-message" *ngIf="resetUrl">
        Email delivery is not configured yet on this site. Use the button below to continue with your password reset.
      </p>

      <a *ngIf="resetUrl" [href]="resetUrl" class="dev-reset-link">
        Continue to Reset Password
      </a>

      <button type="submit" class="reset-btn">
        {{ isSubmitting ? 'Preparing Reset...' : 'Send Reset Link' }}
      </button>
    </form>

    <a routerLink="/login" class="back-link">Back to Login</a>
  </div>
</section>
