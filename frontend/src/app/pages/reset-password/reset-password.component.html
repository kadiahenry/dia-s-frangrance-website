<app-banner
  title="Reset Password"
  subtitle="Choose a new secure password for your account."
  background="default"
  [hideBreadcrumbs]="true">
</app-banner>

<section class="reset-page">
  <div class="reset-card">
    <h2>Create a New Password</h2>
    <p class="reset-subtext">
      Enter your new password below to finish resetting your account.
    </p>

    <form [formGroup]="resetPasswordForm" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="new-password">New Password</label>
        <input
          type="password"
          id="new-password"
          formControlName="password"
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label for="confirm-new-password">Confirm New Password</label>
        <input
          type="password"
          id="confirm-new-password"
          formControlName="confirmPassword"
          autocomplete="new-password"
        />
      </div>

      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="success-message" *ngIf="successMessage">{{ successMessage }}</p>

      <button type="submit" class="reset-btn">
        {{ isSubmitting ? 'Resetting...' : 'Reset Password' }}
      </button>
    </form>

    <a routerLink="/login" class="back-link">Back to Login</a>
  </div>
</section>
