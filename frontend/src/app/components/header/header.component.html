<header class="header">

  <div class="logo">
    <a routerLink="/" aria-label="Dia's Fragrances and More homepage">
      <img
        src="assets/images/logo-small-77.png"
        srcset="assets/images/logo-small-77.png 1x, assets/images/logo-small.png 2x"
        alt="Dia's Fragrances and More logo"
        width="77"
        height="82"
        decoding="async"
        fetchpriority="high">
    </a>
  </div>

  <button
    type="button"
    class="menu-toggle"
    (click)="toggleMenu()"
    [attr.aria-expanded]="isMenuOpen"
    aria-controls="primary-navigation"
    aria-label="Toggle navigation menu"
  >
    Menu
  </button>

  <nav class="nav-links" id="primary-navigation" [class.open]="isMenuOpen" aria-label="Primary">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Home</a>
    <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
    <a routerLink="/products" routerLinkActive="active" (click)="closeMenu()">Products</a>

    <div class="dropdown" [class.open]="isInfoMenuOpen">
      <button
        type="button"
        class="dropdown-toggle"
        aria-haspopup="true"
        [attr.aria-expanded]="isInfoMenuOpen"
        aria-controls="info-menu"
        (click)="toggleInfoMenu()"
      >
        Info
      </button>

      <div class="dropdown-menu" id="info-menu">
        <a routerLink="/shipping" (click)="closeMenu()">Shipping Info</a>
        <a routerLink="/returns" (click)="closeMenu()">Return Policy</a>
        <a routerLink="/contact" (click)="closeMenu()">Contact Us</a>
        <a routerLink="/privacy" (click)="closeMenu()">Privacy Policy</a>
        <a routerLink="/accessibility" (click)="closeMenu()">Accessibility</a>
      </div>
    </div>
  </nav>

  <div class="header-actions">
    <label class="sr-only" for="site-search">Search products</label>
    <input
      type="text"
      class="search-bar"
      id="site-search"
      name="search"
      placeholder="Search products..."
      [(ngModel)]="searchTerm"
      (keyup.enter)="search()"
      aria-label="Search products"
    />

    <button
      type="button"
      class="icon-btn"
      aria-label="View wishlist"
      (click)="goToWishlist()"
    >
      <svg class="header-icon header-icon--wishlist" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M12 21.35 10.55 20.03C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35Z"></path>
      </svg>
    </button>

    <button
      type="button"
      class="icon-btn cart-btn"
      aria-label="View cart"
      (click)="goToCart()"
    >
      <svg class="header-icon header-icon--cart" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M7 18C5.9 18 5.01 18.9 5.01 20S5.9 22 7 22 9 21.1 9 20 8.1 18 7 18Zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2ZM7.17 14h9.95c.75 0 1.4-.41 1.74-1.03L22 7.5V6H6.21L5.27 4H2v2h2l3.6 7.59-1.35 2.44C5.52 16.37 6.48 18 8 18h12v-2H8l1.17-2Z"></path>
      </svg>
      <span class="cart-count" [attr.aria-label]="cartCount + ' items in cart'">{{ cartCount }}</span>
    </button>

    <div class="auth-actions">
      <span *ngIf="authService.isLoggedIn()" class="welcome-chip">
        Welcome back, {{ authService.getDisplayName() }}
      </span>

      <a *ngIf="!authService.isLoggedIn()" routerLink="/login" class="login-btn">
        Login
      </a>
      <a *ngIf="authService.isAdmin()" routerLink="/admin-dashboard" class="login-btn">
        Admin Dashboard
      </a>
      <button
        *ngIf="authService.isLoggedIn()"
        type="button"
        class="login-btn"
        (click)="logout()"
      >
        Logout
      </button>
    </div>
  </div>

</header>
